name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version (e.g. 1.3.0)"
        required: true
      developmentVersion:
        description: "Next development version (e.g. 1.4.0-SNAPSHOT)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGES_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          server-id: github-packages
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            !~/.m2/repository/com/plantogether
          key: m2-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-${{ runner.os }}-

      - name: Prepare release
        run: |
          mvn --batch-mode -s .settings.xml release:prepare \
            -DreleaseVersion=${{ inputs.releaseVersion }} \
            -DdevelopmentVersion=${{ inputs.developmentVersion }} \
            -Dusername=x-access-token \
            -Dpassword=${{ secrets.PACKAGES_TOKEN }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Perform release (deploy to GitHub Packages)
        run: |
          mvn --batch-mode -s .settings.xml release:perform \
            -Dgoals="deploy -DskipTests"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.releaseVersion }}
          name: "v${{ inputs.releaseVersion }}"
          generate_release_notes: true
